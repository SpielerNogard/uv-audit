[tox]
envlist = py313
          linting
          pyright


[testenv]
dependency_groups = dev
commands =
    pytest --cov=uv_audit --cov-report=term-missing --cov-report=html:cov_html tests
    coverage report --fail-under=55

[testenv:linting]
allowlist_externals = git
basepython = python3.13
dependency_groups = linting
commands =
    ruff check
    ruff format --check
    cz check --rev-range origin/main..HEAD

[testenv:pyright]
basepython = python3.13
dependency_groups = dev-tools
commands =
    pyright src

[testenv:mkdocs-serve]
basepython=python3.13
skip_install = true
dependency_groups = mkdocs
commands =
    mkdocs serve

[testenv:format]
basepython = python3.13
dependency_groups = dev-tools
commands =
    ruff check --fix
    ruff format
