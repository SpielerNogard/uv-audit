# action.yml
name: uv-audit
description: Scan Python dependency files for known vulnerabilities and report findings on PRs.
branding:
  icon: shield
  color: blue

inputs:
  path:
    description: Root directory for discovery
    required: false
    default: "."
  include:
    description: Newline-separated glob patterns to match
    required: false
    default: |
      **/pyproject.toml
      **/requirements*.txt
  exclude:
    description: Newline-separated path components or globs to skip
    required: false
    default: |
      .venv
      venv
      .tox
      node_modules
      .git
      dist
      build
      site-packages
  ignore_vulns:
    description: Newline-separated vulnerability IDs to suppress
    required: false
    default: ""
  fail_on_vuln:
    description: Exit non-zero when non-ignored vulnerabilities are found
    required: false
    default: "true"
  pyproject_args:
    description: Extra CLI args appended to uv-audit for pyproject scans
    required: false
    default: "--all"
  uv_audit_version:
    description: Version of uv-audit2 to install from PyPI (kept in sync via commitizen)
    required: false
    default: "0.3.1"  # x-cz-version
  uv_audit_source:
    description: "Optional installable source for uv-audit (path or VCS URL); when set, overrides uv_audit_version"
    required: false
    default: ""
  comment_on_pr:
    description: Create or update the sticky PR comment when running in PR context
    required: false
    default: "true"
  github_token:
    description: Token used for the comment API
    required: false
    default: ${{ github.token }}

outputs:
  vulnerable:
    description: "'true' when non-ignored vulnerabilities were found"
    value: ${{ steps.report.outputs.vulnerable }}
  vuln_count:
    description: Number of non-ignored findings
    value: ${{ steps.report.outputs.vuln_count }}
  ignored_count:
    description: Number of ignored findings
    value: ${{ steps.report.outputs.ignored_count }}
  report_json:
    description: Aggregated JSON report as a string
    value: ${{ steps.report.outputs.report_json }}

# All steps live in this root composite action because GitHub resolves
# `uses: ./<path>` inside a composite action against the calling
# workflow's GITHUB_WORKSPACE, not the action's own checkout. Nested
# local action references therefore break when uv-audit is consumed
# from another repository.
runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - uses: astral-sh/setup-uv@7edac99f961f18b581bbd960d59d049f04c0002f # v6.10.0
    - name: Install uv-audit
      shell: bash
      env:
        UV_AUDIT_SOURCE: ${{ inputs.uv_audit_source }}
        UV_AUDIT_VERSION: ${{ inputs.uv_audit_version }}
      run: |
        if [ -n "$UV_AUDIT_SOURCE" ]; then
          uv tool install "$UV_AUDIT_SOURCE"
        else
          uv tool install "uv-audit2==$UV_AUDIT_VERSION"
        fi
    - id: discover
      shell: bash
      env:
        UV_AUDIT_INCLUDE: ${{ inputs.include }}
        UV_AUDIT_EXCLUDE: ${{ inputs.exclude }}
        UV_AUDIT_PATH: ${{ inputs.path }}
        PREFIX: ${{ inputs.path }}
      run: |
        set -euo pipefail
        include_args=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          include_args+=(--include "$line")
        done <<< "$UV_AUDIT_INCLUDE"
        exclude_args=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          exclude_args+=(--exclude "$line")
        done <<< "$UV_AUDIT_EXCLUDE"

        uv-audit --discover --json "${include_args[@]}" "${exclude_args[@]}" "$UV_AUDIT_PATH" > discover.json
        python -c "
        import json, os
        prefix = os.environ['PREFIX'].rstrip('/')
        data = json.load(open('discover.json'))
        if prefix and prefix != '.':
            for entry in data['files']:
                entry['path'] = f\"{prefix}/{entry['path']}\"
        json.dump(data, open('discover.json', 'w'))
        "
        files=$(python -c 'import json,sys; print(json.dumps(json.load(open("discover.json"))["files"]))')
        count=$(python -c 'import json; print(len(json.load(open("discover.json"))["files"]))')
        echo "files=$files" >> "$GITHUB_OUTPUT"
        echo "count=$count" >> "$GITHUB_OUTPUT"
    - name: Scan each file
      if: ${{ steps.discover.outputs.count != '0' }}
      shell: bash
      env:
        FILES_JSON: ${{ steps.discover.outputs.files }}
        PYPROJECT_ARGS: ${{ inputs.pyproject_args }}
      run: |
        set -euo pipefail
        mkdir -p artifacts
        idx=0
        # Use process substitution — a piped `while` runs in a subshell and
        # would discard idx increments, causing all scans to overwrite scan-0.
        while IFS=$'\t' read -r file kind; do
          mkdir -p "artifacts/scan-$idx"
          extra=()
          if [ "$kind" = "pyproject" ]; then
            # shellcheck disable=SC2206
            extra=($PYPROJECT_ARGS)
          fi
          set +e
          uv-audit --json -r "$file" "${extra[@]}" > "artifacts/scan-$idx/scan.json"
          rc=$?
          set -e
          if [ $rc -ne 0 ] && [ $rc -ne 1 ]; then
            FILE="$file" KIND="$kind" RC="$rc" SCAN_PATH="artifacts/scan-$idx/scan.json" \
              python -c "
        import json, os
        json.dump(
          {'inputs': [{'source': os.path.abspath(os.environ['FILE']),
                       'kind': os.environ['KIND'],
                       'groups': [], 'extras': [],
                       'error': f\"uv-audit exit {os.environ['RC']}\"}],
           'vulnerable': False},
          open(os.environ['SCAN_PATH'], 'w'))
        "
          fi
          idx=$((idx + 1))
        done < <(echo "$FILES_JSON" | python -c '
        import json, sys
        for entry in json.load(sys.stdin):
            print(entry["path"] + "\t" + entry["kind"])
        ')
    - id: report
      shell: bash
      env:
        IGNORE_VULNS: ${{ inputs.ignore_vulns }}
        UV_AUDIT_SOURCE: ${{ inputs.uv_audit_source }}
        UV_AUDIT_VERSION: ${{ inputs.uv_audit_version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        if [ -n "$UV_AUDIT_SOURCE" ]; then
          with_spec="$UV_AUDIT_SOURCE"
        else
          with_spec="uv-audit2==$UV_AUDIT_VERSION"
        fi
        uv run --with "$with_spec" \
          python "$ACTION_PATH/scripts/report.py" \
            --artifacts-dir artifacts \
            --repo-root "$GITHUB_WORKSPACE" \
            --ignore-vulns "$IGNORE_VULNS"
    - name: Post or update sticky PR comment
      if: ${{ inputs.comment_on_pr == 'true' && github.event.pull_request != null }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        VULNERABLE: ${{ steps.report.outputs.vulnerable }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('comment.md', 'utf8');
          const marker = '<!-- uv-audit-report -->';
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const vulnerable = process.env.VULNERABLE === 'true';

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find(c => c.body && c.body.startsWith(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
          } else if (vulnerable) {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body,
            });
          }
      continue-on-error: true
    - name: Fail when vulnerabilities present
      if: ${{ inputs.fail_on_vuln == 'true' && steps.report.outputs.vulnerable == 'true' }}
      shell: bash
      env:
        VULN_COUNT: ${{ steps.report.outputs.vuln_count }}
      run: |
        echo "::error::uv-audit found $VULN_COUNT non-ignored vulnerabilities"
        exit 1
