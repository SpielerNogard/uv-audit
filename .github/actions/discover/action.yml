# .github/actions/discover/action.yml
name: uv-audit discover
description: Discover Python dependency files matching include/exclude patterns.

inputs:
  path:
    description: Root directory for discovery
    required: false
    default: "."
  include:
    description: Newline-separated glob patterns
    required: false
    default: |
      **/pyproject.toml
      **/requirements*.txt
  exclude:
    description: Newline-separated path components or globs to skip
    required: false
    default: |
      .venv
      venv
      .tox
      node_modules
      .git
      dist
      build
      site-packages
  uv_audit_version:
    description: Version of uv-audit2 to install from PyPI
    required: true
  uv_audit_source:
    description: "Optional installable source for uv-audit (path or VCS URL); when set, overrides uv_audit_version"
    required: false
    default: ""

outputs:
  files:
    description: JSON array of {path, kind} entries (compact, single-line)
    value: ${{ steps.run.outputs.files }}
  count:
    description: Number of discovered files
    value: ${{ steps.run.outputs.count }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - uses: astral-sh/setup-uv@7edac99f961f18b581bbd960d59d049f04c0002f # v6.10.0
    - name: Install uv-audit
      shell: bash
      env:
        UV_AUDIT_SOURCE: ${{ inputs.uv_audit_source }}
        UV_AUDIT_VERSION: ${{ inputs.uv_audit_version }}
      run: |
        if [ -n "$UV_AUDIT_SOURCE" ]; then
          uv tool install "$UV_AUDIT_SOURCE"
        else
          uv tool install "uv-audit2==$UV_AUDIT_VERSION"
        fi
    - id: run
      shell: bash
      env:
        UV_AUDIT_INCLUDE: ${{ inputs.include }}
        UV_AUDIT_EXCLUDE: ${{ inputs.exclude }}
        UV_AUDIT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        include_args=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          include_args+=(--include "$line")
        done <<< "$UV_AUDIT_INCLUDE"
        exclude_args=()
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          exclude_args+=(--exclude "$line")
        done <<< "$UV_AUDIT_EXCLUDE"

        uv-audit --discover --json "${include_args[@]}" "${exclude_args[@]}" "$UV_AUDIT_PATH" > discover.json
        files=$(python -c 'import json,sys; print(json.dumps(json.load(open("discover.json"))["files"]))')
        count=$(python -c 'import json; print(len(json.load(open("discover.json"))["files"]))')
        echo "files=$files" >> "$GITHUB_OUTPUT"
        echo "count=$count" >> "$GITHUB_OUTPUT"
