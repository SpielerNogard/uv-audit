# .github/actions/report/action.yml
name: uv-audit report
description: Aggregate scan artifacts, write step summary, post or update the sticky PR comment.

inputs:
  artifacts_dir:
    description: Directory containing downloaded scan-* artifact subdirectories
    required: true
  repo_root:
    description: Absolute repository root for relativising file paths
    required: true
  ignore_vulns:
    description: Newline-separated vulnerability IDs to suppress
    required: false
    default: ""
  comment_on_pr:
    description: Whether to create or update a sticky PR comment
    required: false
    default: "true"
  github_token:
    description: Token for the comment API
    required: true
  uv_audit_version:
    description: Version of uv-audit2 to install from PyPI
    required: true
  uv_audit_source:
    description: "Optional installable source for uv-audit (path or VCS URL); when set, overrides uv_audit_version"
    required: false
    default: ""

outputs:
  vulnerable:
    description: "'true' when non-ignored vulnerabilities were found"
    value: ${{ steps.run.outputs.vulnerable }}
  vuln_count:
    description: Number of non-ignored findings
    value: ${{ steps.run.outputs.vuln_count }}
  ignored_count:
    description: Number of ignored findings
    value: ${{ steps.run.outputs.ignored_count }}
  report_json:
    description: Aggregated JSON report as a string
    value: ${{ steps.run.outputs.report_json }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'
    - uses: astral-sh/setup-uv@7edac99f961f18b581bbd960d59d049f04c0002f # v6.10.0
    - name: Install uv-audit (provides aggregate + render)
      shell: bash
      env:
        UV_AUDIT_SOURCE: ${{ inputs.uv_audit_source }}
        UV_AUDIT_VERSION: ${{ inputs.uv_audit_version }}
      run: |
        if [ -n "$UV_AUDIT_SOURCE" ]; then
          uv tool install "$UV_AUDIT_SOURCE"
        else
          uv tool install "uv-audit2==$UV_AUDIT_VERSION"
        fi
    - id: run
      shell: bash
      env:
        IGNORE_VULNS: ${{ inputs.ignore_vulns }}
        UV_AUDIT_SOURCE: ${{ inputs.uv_audit_source }}
        UV_AUDIT_VERSION: ${{ inputs.uv_audit_version }}
        ACTION_PATH: ${{ github.action_path }}
        ARTIFACTS_DIR: ${{ inputs.artifacts_dir }}
        REPO_ROOT: ${{ inputs.repo_root }}
      run: |
        if [ -n "$UV_AUDIT_SOURCE" ]; then
          with_spec="$UV_AUDIT_SOURCE"
        else
          with_spec="uv-audit2==$UV_AUDIT_VERSION"
        fi
        uv run --with "$with_spec" \
          python "$ACTION_PATH/report.py" \
            --artifacts-dir "$ARTIFACTS_DIR" \
            --repo-root "$REPO_ROOT" \
            --ignore-vulns "$IGNORE_VULNS"
    - name: Post or update sticky PR comment
      if: ${{ inputs.comment_on_pr == 'true' && github.event.pull_request != null }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        VULNERABLE: ${{ steps.run.outputs.vulnerable }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('comment.md', 'utf8');
          const marker = '<!-- uv-audit-report -->';
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const vulnerable = process.env.VULNERABLE === 'true';

          const { data: comments } = await github.rest.issues.listComments({
            owner, repo, issue_number, per_page: 100,
          });
          const existing = comments.find(c => c.body && c.body.startsWith(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner, repo, comment_id: existing.id, body,
            });
          } else if (vulnerable) {
            await github.rest.issues.createComment({
              owner, repo, issue_number, body,
            });
          }
      continue-on-error: true
