# .github/workflows/test-action.yml
name: test-action

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: a
        uses: ./
        with:
          path: tests/fixtures/repos/clean
          fail_on_vuln: "true"
          comment_on_pr: "false"
          uv_audit_source: ${{ github.workspace }}
      - name: Check outputs
        env:
          VULNERABLE: ${{ steps.a.outputs.vulnerable }}
          VULN_COUNT: ${{ steps.a.outputs.vuln_count }}
        run: |
          test "$VULNERABLE" = "false"
          test "$VULN_COUNT" = "0"

  vulnerable_fails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: a
        continue-on-error: true
        uses: ./
        with:
          path: tests/fixtures/repos/vulnerable
          fail_on_vuln: "true"
          comment_on_pr: "false"
          uv_audit_source: ${{ github.workspace }}
      - name: Action must have failed
        env:
          OUTCOME: ${{ steps.a.outcome }}
        run: test "$OUTCOME" = "failure"
      - name: Output must report vulnerable
        env:
          VULNERABLE: ${{ steps.a.outputs.vulnerable }}
        run: test "$VULNERABLE" = "true"

  ignored_passes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@7edac99f961f18b581bbd960d59d049f04c0002f # v6.10.0
      - name: Discover advisory ID for flask 1.1.2
        id: ids
        run: |
          uv tool install "$GITHUB_WORKSPACE"
          uv-audit --json -r tests/fixtures/repos/ignored/requirements.txt > out.json || true
          # Take the first vuln id; allows the test to track upstream changes.
          first_id=$(python -c "import json; d=json.load(open('out.json')); print(d['inputs'][0]['vulnerabilities'][0]['id'])")
          echo "first_id=$first_id" >> "$GITHUB_OUTPUT"
      - id: a
        uses: ./
        with:
          path: tests/fixtures/repos/ignored
          ignore_vulns: ${{ steps.ids.outputs.first_id }}
          fail_on_vuln: "true"
          comment_on_pr: "false"
          uv_audit_source: ${{ github.workspace }}
      - name: Check ignored count
        env:
          IGNORED_COUNT: ${{ steps.a.outputs.ignored_count }}
        run: test "$IGNORED_COUNT" != "0"

  monorepo_via_composite:
    # The reusable workflow references its helper actions via the namespaced
    # tag form (`SpielerNogard/uv-audit/.github/actions/...@<version>`), which
    # cannot resolve before the first release. We therefore self-test the
    # monorepo path through the composite action instead. The matrix-fan-out
    # logic of scan.yml is exercised by consumers post-release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: a
        continue-on-error: true
        uses: ./
        with:
          path: tests/fixtures/repos/monorepo
          fail_on_vuln: "false"
          comment_on_pr: "false"
          uv_audit_source: ${{ github.workspace }}
      - name: Check monorepo outputs
        env:
          VULNERABLE: ${{ steps.a.outputs.vulnerable }}
          VULN_COUNT: ${{ steps.a.outputs.vuln_count }}
        run: |
          test "$VULNERABLE" = "true"
          test "$VULN_COUNT" != "0"
